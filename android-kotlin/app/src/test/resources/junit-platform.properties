# JUnit Platform Configuration for Test Performance Optimization

# Parallel execution controlled by gradle configuration
# junit.jupiter.execution.parallel.enabled=false  # Disabled - gradle handles this

# Performance monitoring extensions
junit.jupiter.extensions.autodetection.enabled=true

# Test execution timeout configuration - realistic timeouts for complex operations
junit.jupiter.execution.timeout.default=60s
junit.jupiter.execution.timeout.testable.method.default=30s
junit.jupiter.execution.timeout.testtemplate.method.default=30s

# Display configuration for better test output
junit.jupiter.displayname.generator.default=org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores

# Logging configuration
java.util.logging.manager=org.apache.logging.log4j.jul.LogManager